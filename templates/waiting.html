<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Remind – Timer Running</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container waiting-container">

  <h2 class="waiting-title">Timer Started</h2>

  <p class="waiting-text">
    You can scroll now. We'll gently remind you when time is up.
  </p>

  <div class="waiting-timer" id="timer">
    {{ "%02d"|format(time_limit|int) }}:00
  </div>

  <p class="waiting-note">
    This page is tracking your time in the background.
  </p>

</div>

<script>
let timeRemaining = parseInt("{{ time_limit }}");

const timerDisplay = document.getElementById("timer");

const countdown = setInterval(function(){

    let minutes = Math.floor(timeRemaining / 60);
    let seconds = timeRemaining % 60;

    timerDisplay.textContent =
        String(minutes).padStart(2,'0') + ":" +
        String(seconds).padStart(2,'0');

    timeRemaining--;

    if(timeRemaining < 0){
        clearInterval(countdown);
        window.location.href = "/break";
    }

},1000);
</script>

</body>
</html>
