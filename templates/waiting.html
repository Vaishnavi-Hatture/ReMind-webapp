<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Remind – Timer Running</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h2 style="text-align:center;">Timer Started</h2>

<p style="text-align:center;">
You can scroll now. We will remind you later.
</p>

<h1 id="timer" style="text-align:center; margin-top:20px;">
00:00
</h1>

</div>

<script>

let minutes = parseInt("{{ time_limit }}");
let seconds = 0;

const timerDisplay = document.getElementById("timer");

const countdown = setInterval(function(){

    if(seconds === 0){
        if(minutes === 0){
            clearInterval(countdown);
            window.location.href = "/break";
            return;
        }
        minutes--;
        seconds = 59;
    }
    else{
        seconds--;
    }

    timerDisplay.textContent =
        String(minutes).padStart(2,'0') + ":" +
        String(seconds).padStart(2,'0');

},1000);

</script>

</body>
</html>
