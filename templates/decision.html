<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Remind – Decision</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <div class="container decision-container">

    <div class="decision-icon">🧘</div>

    <h2 class="decision-title">
      Your 5-minute reset is complete.
    </h2>

    <p class="decision-subtitle">
      You chose to pause. That takes awareness.<br>
      What would you like to do next?
    </p>

    <div class="decision-actions">

      <a href="/" class="btn-secondary">
        Return to Scrolling
      </a>

      <a href="/swipe" class="btn-primary">
        Do Another Round ✦
      </a>

      <a href="/" class="btn-reset">
        Start Fresh / Change Interests
      </a>

    </div>

    <p class="decision-note">
      You've already done something most people won't — you paused.
    </p>

  </div>

</body>
</html>
